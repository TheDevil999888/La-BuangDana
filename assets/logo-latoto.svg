<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-labelledby="title desc">
  <title id="title">Latoto Logo</title>
  <desc id="desc">Gold and silver Latoto wordmark with crown.</desc>
  <defs>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8d4"/>
      <stop offset="14%" stop-color="#ffe88a"/>
      <stop offset="28%" stop-color="#d79f1f"/>
      <stop offset="44%" stop-color="#fff0aa"/>
      <stop offset="58%" stop-color="#b97808"/>
      <stop offset="78%" stop-color="#f4ca47"/>
      <stop offset="100%" stop-color="#fff0b0"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8e5600"/>
      <stop offset="45%" stop-color="#f4cb49"/>
      <stop offset="100%" stop-color="#7c4600"/>
    </linearGradient>
    <linearGradient id="silverFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#dbdbdb"/>
      <stop offset="36%" stop-color="#9b9b9b"/>
      <stop offset="52%" stop-color="#fafafa"/>
      <stop offset="72%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="silverStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8e8e8e"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7f7f7f"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#f6d15a" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f6d15a" flood-opacity="0.09"/>
    </filter>
    <filter id="silverGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6.5" flood-color="#ffffff" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g font-family="Georgia, Times New Roman, serif" font-weight="700" text-rendering="geometricPrecision">
    <text x="8" y="150" font-size="150" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2.7" filter="url(#softGlow)">A</text>
    <text x="18" y="150" font-size="150" fill="none" stroke="#fff2bf" stroke-width="0.8" opacity="0.45">A</text>
    <rect x="210" y="18" width="2.5" height="150" rx="1.25" fill="#fff8e1" opacity="0.96"/>
    <text x="280" y="150" font-size="120" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2.2" filter="url(#softGlow)">LA</text>
    <text x="288" y="150" font-size="120" fill="none" stroke="#fff2bf" stroke-width="0.7" opacity="0.32">LA</text>
    <text x="468" y="150" font-size="120" fill="url(#silverFill)" stroke="url(#silverStroke)" stroke-width="2.1" filter="url(#silverGlow)">TOTO</text>
    <text x="476" y="150" font-size="120" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.24">TOTO</text>
  </g>

  <g transform="translate(612 4)">
    <path d="M0 28 18 46 12 10Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
    <path d="M28 8 46 40 34 44Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
    <path d="M58 0 74 40 42 40Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
    <path d="M88 8 82 44 70 40Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
    <path d="M116 28 104 10 98 46Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
    <circle cx="10" cy="10" r="7" fill="#ffe487" stroke="#8a5900" stroke-width="2"/>
    <circle cx="34" cy="4" r="7" fill="#ffe487" stroke="#8a5900" stroke-width="2"/>
    <circle cx="58" cy="2" r="7" fill="#ffe487" stroke="#8a5900" stroke-width="2"/>
    <circle cx="82" cy="4" r="7" fill="#ffe487" stroke="#8a5900" stroke-width="2"/>
    <circle cx="106" cy="10" r="7" fill="#ffe487" stroke="#8a5900" stroke-width="2"/>
    <path d="M4 44h108l-10 16H14Z" fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="2"/>
  </g>
</svg>
